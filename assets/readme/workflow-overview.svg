<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Podcast RSS to Transcript workflow overview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="420" fill="url(#bg)"/>
  <text x="60" y="64" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#0f172a">How Podcast RSS to Transcript Works</text>
  <text x="60" y="96" font-family="Arial, sans-serif" font-size="18" fill="#334155">From feed URL to transcript in 4 deterministic steps</text>

  <rect x="60" y="150" rx="18" ry="18" width="230" height="170" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="84" y="188" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">1) Feed Input</text>
  <text x="84" y="220" font-family="Arial, sans-serif" font-size="15" fill="#334155">Paste RSS / Atom URL</text>
  <text x="84" y="246" font-family="Arial, sans-serif" font-size="15" fill="#334155">List available episodes</text>
  <text x="84" y="272" font-family="Arial, sans-serif" font-size="15" fill="#334155">Pick title or guid</text>

  <rect x="350" y="150" rx="18" ry="18" width="230" height="170" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="374" y="188" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">2) Resolve</text>
  <text x="374" y="220" font-family="Arial, sans-serif" font-size="15" fill="#334155">Find exact episode</text>
  <text x="374" y="246" font-family="Arial, sans-serif" font-size="15" fill="#334155">Handle ambiguity cleanly</text>
  <text x="374" y="272" font-family="Arial, sans-serif" font-size="15" fill="#334155">Return metadata JSON</text>

  <rect x="640" y="150" rx="18" ry="18" width="230" height="170" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="664" y="188" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">3) Download</text>
  <text x="664" y="220" font-family="Arial, sans-serif" font-size="15" fill="#334155">Save audio locally</text>
  <text x="664" y="246" font-family="Arial, sans-serif" font-size="15" fill="#334155">Optional ffmpeg speed-up</text>
  <text x="664" y="272" font-family="Arial, sans-serif" font-size="15" fill="#334155">Ready for API call</text>

  <rect x="930" y="150" rx="18" ry="18" width="210" height="170" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="954" y="188" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">4) Transcribe</text>
  <text x="954" y="220" font-family="Arial, sans-serif" font-size="15" fill="#334155">Text or diarized JSON</text>
  <text x="954" y="246" font-family="Arial, sans-serif" font-size="15" fill="#334155">Markdown-ready output</text>
  <text x="954" y="272" font-family="Arial, sans-serif" font-size="15" fill="#334155">Speaker-tag capable</text>

  <line x1="290" y1="235" x2="340" y2="235" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="580" y1="235" x2="630" y2="235" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="870" y1="235" x2="920" y2="235" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
